<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
            <meta charset="utf-8">
            <title>Login</title>
            <link rel="stylesheet" href="registration.css">
    </head>
        <body>
            <div class="registration-box">
                <h1>S'inscrire</h1>
                <form method="post">
                    <div class="textbox">
                        <input type="text" required> 
                        <span></span>
                        <label>Entrer votre nom</label>
                    </div>
                    <div class="textbox">
                        <input type="text" required> 
                        <span></span>
                        <label>Entrer votre prénom</label>
                    </div>
                    <div class="textbox">
                        <input type="text" required> 
                        <span></span>
                        <label>Entrer votre numéro de téléphone</label>
                    </div>
                    <div class="textbox">
                        <input type="text" required> 
                        <span></span>
                        <label>Saisir votre ville de résidence</label>
                    </div>
                    <div class="textbox">
                        <input type="password" required> 
                        <span></span>
                        <label>Créer votre mot de passe</label>
                    </div>
                    <div class="textbox">
                        <input type="password" required> 
                        <span></span>
                        <label>Confirmer votre mot de passe</label>
                    </div>

                    <input type="button" name="" value="Sign up">
                </form>
        </div>
       
        </body>
</html>
