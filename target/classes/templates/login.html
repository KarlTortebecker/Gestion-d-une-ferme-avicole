<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
            <meta charset="utf-8">
            <title>Login</title>
            <link rel="stylesheet" href="login.css">
    </head>
        <body>
            <div class="login-box">
                <h1>Login Form</h1>
                <form method="post">
                    <div class="textbox">
                        <input type="text" required> 
                        <span></span>
                        <label>Username</label>
                    </div>
                    
                    <div class="textbox">
                        <input type="password" required> 
                        <span></span>
                        <label>Password</label>
                    </div>

                    <input type="button" name="" value="Login">
                </form>
        </div>
       
        </body>
</html>
